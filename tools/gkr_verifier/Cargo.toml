cargo-features = ["panic-immediate-abort"]

[package]
name = "gkr_verifier"
version = "0.1.0"
edition = "2021"
authors = ["The Matter Labs Team <hello@matterlabs.dev>"]
homepage = "https://zksync.io/"
repository = "https://github.com/matter-labs/zksync-airbender/"
license = "MIT OR Apache-2.0"
keywords = ["blockchain", "zksync", "zk"]
categories = ["cryptography"]

[dependencies]
verifier_common = { path = "../../verifier_common", default-features = false, features = ["gkr_verify", "modular_ops", "blake2_with_compression"] }
non_determinism_source = { path = "../../non_determinism_source" }
riscv_common = { path = "../../riscv_common", features = ["boot_sequence", "no_memset_override"] }
field = { path = "../../field", default-features = false, features = ["modular_ops"] }

[workspace]

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "immediate-abort"
debug = true
strip = false
