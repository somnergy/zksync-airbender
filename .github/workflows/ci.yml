name: "Rust CI"
on:
  push:
    branches:
      - main
      - stable
      - dev
  pull_request:

permissions: read-all

env:
  RUST_TOOLCHAIN: nightly-2026-02-10

jobs:
  tests:
    name: tests
    runs-on: [matterlabs-ci-runner-highmem]
    steps:
      - uses: actions/checkout@v3
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          rustflags: ""
      - name: Setup
        run: |
          rustup set profile minimal
      - name: Compile
        run: cargo build --verbose
      - name: Unit tests (CI)
        env:
          CI: "true"
        run: cargo test --profile cli -- --nocapture

  formatting:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
          rustflags: ""
      - name: Setup
        run: |
          rustup set profile minimal
      - name: Rustfmt Check
        uses: actions-rust-lang/rustfmt@v1

  circuits_generated:
    name: circuits_generated
    runs-on: [matterlabs-ci-runner-c3d]
    steps:
      - uses: actions/checkout@v3
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
          rustflags: ""
      - name: Setup
        run: |
          rustup set profile default
      - name: Regenerate verifiers
        run: ./recreate_verifiers.sh
      - name: Check if anything has changed
        run: |
          MODIFIED_FILES=$(git status --porcelain)
          if [ -n "$MODIFIED_FILES" ]; then
            echo "The following files were modified - did you run ./recreate_verifiers.sh? "
            echo "$MODIFIED_FILES"
            exit 1
          else
            echo "No files were modified."
          fi

  check_verifiers:
    name: check_verifiers
    runs-on: [matterlabs-ci-runner-c3d]
    steps:
      - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8 # v3

      - name: Build fresh verifiers
        run: |
          tools/reproduce/reproduce.sh

      - name: Fail if any files were modified
        run: |
          git status --porcelain
          git diff --name-only
          if [ -n "$(git diff --name-only)" ]; then
            echo "❌ The following files were modified. Did you run tools/reproduce/reproduce.sh?:"
            git diff --name-only
            exit 1
          fi

  build_cli:
    name: build_cli (${{ matrix.security_label }})
    runs-on: [matterlabs-ci-runner-c3d]
    strategy:
      fail-fast: false
      matrix:
        include:
          - security_label: security_80
            artifact_name: cli_80
            build_command: cargo build --release -p cli
          - security_label: security_100
            artifact_name: cli_100
            build_command: cargo build --release -p cli --no-default-features --features security_100
    steps:
      - uses: actions/checkout@v3
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          rustflags: ""
      - name: Setup
        run: rustup set profile minimal
      - name: Compile
        run: ${{ matrix.build_command }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            target/release/cli
            examples/basic_fibonacci/app.bin
            examples/basic_fibonacci/app.text

  cli_smoke_verify:
    name: cli_smoke_verify (${{ matrix.security_label }})
    runs-on: [matterlabs-ci-runner-c3d]
    needs: [build_cli]
    strategy:
      fail-fast: false
      matrix:
        include:
          - security_label: security_80
            artifact_name: cli_80
          - security_label: security_100
            artifact_name: cli_100
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
      - name: Setup
        run: |
          chmod +x ./target/release/cli
          mkdir -p output
      - name: Prove base
        run: ./target/release/cli prove --bin examples/basic_fibonacci/app.bin --target base --backend cpu --cpu-cycles-bound 16777216 --cpu-worker-threads 8 --output-dir output --output-file base.json
      - name: Verify base
        run: ./target/release/cli verify --proof output/base.json --bin examples/basic_fibonacci/app.bin
      - name: Continue to recursion unified
        run: ./target/release/cli continue-proof --proof output/base.json --bin examples/basic_fibonacci/app.bin --target recursion-unified --cpu-cycles-bound 16777216 --cpu-worker-threads 8 --output-dir output --output-file recursion_unified.json
      - name: Verify recursion unified
        run: ./target/release/cli verify --proof output/recursion_unified.json --bin examples/basic_fibonacci/app.bin

  miri:
    name: miri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: miri
      - name: Run Miri tests
        run: cargo miri test -p riscv_transpiler -- miri_

  # Keep branch protection tied to one stable check name even as the
  # underlying CI fan-out changes over time.
  pr-checks:
    name: pr-checks
    runs-on: ubuntu-latest
    if: always()
    needs:
      - tests
      - formatting
      - circuits_generated
      - check_verifiers
      - build_cli
      - cli_smoke_verify
      - miri
    steps:
      - name: Decide on PR checks
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
